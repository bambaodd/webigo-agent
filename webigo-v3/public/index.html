<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webigo</title>
<style>
:root{--navy:#0F2A47;--blue:#2563EB;--bl:#3B82F6;--bd:#DBEAFE;--bp:#EFF6FF;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;--g400:#94A3B8;--g600:#475569;--g800:#1E293B;--gr:#16A34A;--gp:#F0FDF4;--gd:#DCFCE7;--rd:#DC2626;--rp:#FEF2F2;--or:#D97706;--op:#FFFBEB;--pu:#7C3AED;--pp:#F5F3FF;--wa:#25D366;--f:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);background:var(--g50);color:var(--g800);display:flex;height:100vh;overflow:hidden;}
/* SIDEBAR */
#sb{width:200px;min-width:200px;background:var(--navy);display:flex;flex-direction:column;height:100vh;transition:width .2s;}
.logo{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08);font-size:19px;font-weight:800;color:#fff;letter-spacing:2px;}
.logo span{color:var(--bl);}
#snav{flex:1;padding:6px 0;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:9px;padding:9px 14px;color:rgba(255,255,255,.55);cursor:pointer;font-size:13px;font-weight:500;transition:all .12s;border-left:3px solid transparent;}
.ni:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05);}
.ni.active{color:#fff;background:rgba(37,99,235,.25);border-left-color:var(--bl);}
.ni .ic{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.ns{padding:10px 14px 2px;font-size:10px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1px;}
.sb-bot{padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.25);}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{background:#fff;border-bottom:1px solid var(--g200);padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pt{font-size:15px;font-weight:700;color:var(--navy);}
#con{flex:1;overflow-y:auto;padding:16px;}
/* CARDS */
.card{background:#fff;border-radius:10px;border:1px solid var(--g200);padding:16px;box-shadow:var(--sh);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
/* STAT CARDS */
.sc{background:#fff;border-radius:10px;border:1px solid var(--g200);padding:14px 16px;box-shadow:var(--sh);}
.sv{font-size:28px;font-weight:800;color:var(--navy);line-height:1;}
.sl{font-size:11px;color:var(--g400);margin-top:2px;font-weight:500;}
.ss{font-size:11px;color:var(--gr);margin-top:3px;}
.sc.rev .sv{color:var(--gr);}
.sc.blu .sv{color:var(--blue);}
/* BADGES */
.badge{background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;}
.br{background:var(--rd);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;}
/* STAGE PILLS */
.stg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.sn{background:var(--g100);color:var(--g600);}
.sc2{background:var(--bd);color:var(--blue);}
.sr{background:var(--op);color:var(--or);}
.sh2{background:var(--rp);color:var(--rd);}
.sng{background:var(--pp);color:var(--pu);}
.sd{background:#ECFDF5;color:#059669;}
.scl{background:var(--gd);color:var(--gr);}
.sls{background:var(--g100);color:var(--g400);}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .12s;font-family:var(--f);}
.bp{background:var(--blue);color:#fff;}.bp:hover{background:#1D4ED8;}
.bs{background:var(--g100);color:var(--g800);border:1px solid var(--g200);}.bs:hover{background:var(--g200);}
.bg{background:var(--gr);color:#fff;}.bg:hover{background:#15803D;}
.bn{background:var(--navy);color:#fff;}
.brd{background:var(--rd);color:#fff;}.brd:hover{background:#B91C1C;}
.bwa{background:var(--wa);color:#fff;}.bwa:hover{background:#1da851;}
.bsm{padding:5px 10px;font-size:12px;}
.bxs{padding:3px 8px;font-size:11px;border-radius:6px;}
/* INPUTS */
input,select,textarea{width:100%;padding:8px 11px;border:1px solid var(--g200);border-radius:8px;font-size:13px;font-family:var(--f);color:var(--g800);background:#fff;transition:border .12s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--bp);}
textarea{resize:vertical;min-height:65px;}
.fg{margin-bottom:10px;}
.fl{font-size:11px;font-weight:600;color:var(--g600);display:block;margin-bottom:4px;}
/* TABLE */
.lt{width:100%;border-collapse:collapse;font-size:13px;}
.lt th{background:var(--g50);color:var(--g600);font-weight:600;padding:9px 11px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--g200);position:sticky;top:0;z-index:1;}
.lt td{padding:9px 11px;border-bottom:1px solid var(--g100);vertical-align:middle;}
.lt tr:hover td{background:var(--bp);cursor:pointer;}
.ln{font-weight:700;color:var(--navy);}
.lc{color:var(--g400);font-size:11px;}
.lpic{width:38px;height:38px;border-radius:7px;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden;}
.lpic img{width:100%;height:100%;object-fit:cover;}
/* CALL STATUS PILL */
.cpill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;}
.cpn{background:var(--g100);color:var(--g400);}
.cpc{background:var(--bd);color:var(--blue);}
.cpna{background:var(--op);color:var(--or);}
.cpi{background:var(--gd);color:var(--gr);}
/* PIPELINE */
.pipeline{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;}
.pc{min-width:148px;background:var(--g100);border-radius:9px;padding:10px;}
.pct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:7px;border-bottom:2px solid var(--g200);}
.pcn{float:right;background:var(--navy);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;}
.pcard{background:#fff;border-radius:7px;padding:8px;margin-bottom:5px;border:1px solid var(--g200);cursor:pointer;font-size:12px;transition:border .12s;}
.pcard:hover{border-color:var(--blue);}
/* SCRAPER */
.ccard-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.ccard{background:var(--g50);border:2px solid var(--g200);border-radius:9px;padding:10px 8px;cursor:pointer;text-align:center;transition:all .15s;position:relative;}
.ccard:hover{background:var(--bp);border-color:var(--bl);}
.ccard.sel{background:var(--bp);border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.15);}
.ccard .cflag{font-size:22px;display:block;margin-bottom:3px;}
.ccard .cname{font-size:11px;font-weight:700;color:var(--g800);}
.ccard .cpeak{position:absolute;top:-7px;right:-7px;background:#F59E0B;color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;}
.cat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--g200);background:var(--g50);color:var(--g600);transition:all .12s;}
.chip:hover{border-color:var(--bl);color:var(--blue);}
.chip.sel{background:var(--bp);border-color:var(--blue);color:var(--blue);}
.slog{background:#0F1B2D;border-radius:8px;padding:10px;font-family:monospace;font-size:12px;color:#94A3B8;height:220px;overflow-y:auto;}
.lf{color:#4ADE80;}.lsk{color:#F87171;}.lsr{color:#60A5FA;}.ldt{color:#FCD34D;}
.pbw{background:var(--g200);border-radius:6px;height:8px;overflow:hidden;margin:8px 0;}
.pbf{height:100%;background:linear-gradient(90deg,var(--blue),var(--bl));border-radius:6px;transition:width .4s;}
/* MARKETS */
.mkt{background:#fff;border-radius:10px;border:1px solid var(--g200);padding:14px;box-shadow:var(--sh);}
.mkt.open{border-color:#86EFAC;background:var(--gp);}
.mkt.peak{border-color:#FCD34D;background:#FEFCE8;}
.ms{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.mo{background:var(--gr);color:#fff;}.mp{background:#D97706;color:#fff;}.mc{background:var(--g300);color:var(--g600);}.mw{background:var(--op);color:var(--or);}
.bb{font-size:11px;color:var(--g600);margin-top:6px;background:rgba(0,0,0,.04);padding:5px 8px;border-radius:6px;line-height:1.5;}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:20px 14px;overflow-y:auto;}
.modal{background:#fff;border-radius:12px;width:100%;max-width:740px;padding:22px;position:relative;}
.mcl{position:absolute;top:14px;right:14px;background:var(--g100);border:none;border-radius:7px;padding:4px 10px;cursor:pointer;font-size:16px;color:var(--g600);}
.mcl:hover{background:var(--g200);}
.mnav{position:absolute;top:14px;right:65px;display:flex;gap:4px;}
.mnav button{background:var(--g100);border:none;border-radius:7px;padding:4px 11px;cursor:pointer;font-size:14px;color:var(--g600);font-family:var(--f);}
.mnav button:hover{background:var(--g200);}
.msec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g400);margin:14px 0 5px;}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.il{font-size:11px;color:var(--g400);font-weight:600;}
.iv{font-size:13px;font-weight:600;color:var(--g800);margin-top:2px;}
.aib{background:linear-gradient(135deg,var(--bp),var(--bd));border:1px solid #BFDBFE;border-radius:9px;padding:12px;}
.aibl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--blue);margin-bottom:4px;}
.aibt{font-size:13px;color:var(--g800);line-height:1.65;white-space:pre-wrap;}
.sch{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--bp);color:var(--blue);border-radius:20px;font-size:12px;font-weight:600;text-decoration:none;margin:2px;}
.sch:hover{background:var(--blue);color:#fff;}
.dial-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0;}
.dc{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:25px;font-size:14px;font-weight:700;text-decoration:none;color:#fff;background:var(--gr);border:none;cursor:pointer;font-family:var(--f);}
.dw{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:25px;font-size:14px;font-weight:700;text-decoration:none;color:#fff;background:var(--wa);border:none;cursor:pointer;font-family:var(--f);}
.sp-wrap{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0;}
.sp{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;font-family:var(--f);transition:all .12s;}
.sp.active{border-color:var(--navy)!important;box-shadow:0 0 0 2px rgba(15,42,71,.2);}
.cs-row{display:flex;gap:5px;flex-wrap:wrap;margin:7px 0;}
.cs{padding:5px 12px;border-radius:18px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid;font-family:var(--f);transition:all .12s;}
.csa{background:var(--bp);color:var(--blue);border-color:var(--blue);}
.csa:hover,.csa.on{background:var(--blue);color:#fff;}
.csb{background:var(--op);color:var(--or);border-color:var(--or);}
.csb:hover,.csb.on{background:var(--or);color:#fff;}
.csc{background:var(--gp);color:var(--gr);border-color:var(--gr);}
.csc:hover,.csc.on{background:var(--gr);color:#fff;}
.csd{background:var(--pp);color:var(--pu);border-color:var(--pu);}
.csd:hover,.csd.on{background:var(--pu);color:#fff;}
.cse{background:var(--rp);color:var(--rd);border-color:var(--rd);}
.cse:hover,.cse.on{background:var(--rd);color:#fff;}
.csf{background:var(--gd);color:var(--gr);border-color:var(--gr);}
.csf:hover,.csf.on{background:var(--gr);color:#fff;}
/* MISC */
.em-row{display:flex;}
.em-row input{border-radius:8px 0 0 8px;border-right:none;}
.em-dom{width:150px;border-radius:0 8px 8px 0;background:var(--g50);font-size:12px;border-left:1px solid var(--g200);}
.caller-row{display:flex;gap:6px;margin-bottom:8px;}
.cb2{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid var(--g200);background:var(--g50);color:var(--g600);font-family:var(--f);transition:all .12s;text-align:center;}
.cb2.on{border-color:var(--blue);background:var(--bp);color:var(--blue);}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border-bottom:1px solid var(--g100);}
.tch{width:18px;height:18px;border-radius:5px;border:2px solid var(--g300);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .12s;}
.tch.done{background:var(--gr);border-color:var(--gr);color:#fff;}
.pu2{color:var(--rd);font-size:11px;font-weight:700;}
.ph2{color:var(--or);font-size:11px;font-weight:700;}
.pm2{color:var(--blue);font-size:11px;font-weight:700;}
.tab-row{display:flex;gap:3px;margin-bottom:13px;background:var(--g100);padding:3px;border-radius:9px;width:fit-content;}
.tab-btn{padding:5px 13px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--g600);font-family:var(--f);transition:all .12s;}
.tab-btn.active{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.st{font-size:15px;font-weight:800;color:var(--navy);}
.dv{border:none;border-top:1px solid var(--g100);margin:13px 0;}
.empty{text-align:center;padding:40px 20px;color:var(--g400);}
.ei{font-size:36px;margin-bottom:10px;}
.loading{display:flex;align-items:center;gap:8px;color:var(--g400);font-size:13px;padding:22px;}
.spin{width:16px;height:16px;border:2px solid var(--g200);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.wisdom{background:linear-gradient(135deg,var(--navy),#1a4a7a);border-radius:10px;padding:14px 18px;color:#fff;margin-bottom:14px;}
.wl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.45);margin-bottom:5px;}
.wt{font-size:13px;color:rgba(255,255,255,.88);line-height:1.55;font-style:italic;}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 130px);}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;background:var(--g50);border-radius:9px;margin-bottom:10px;}
.cbm{max-width:78%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.55;}
.cbm.user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:3px;}
.cbm.ai{background:#fff;color:var(--g800);border:1px solid var(--g200);align-self:flex-start;border-bottom-left-radius:3px;}
.pb{background:var(--bp);color:var(--blue);border:none;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);}
.pb:hover{background:var(--blue);color:#fff;}
.tc{background:#fff;border:1px solid var(--g200);border-radius:10px;padding:12px;display:flex;gap:9px;box-shadow:var(--sh);}
.mb2{padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:5px;max-width:82%;}
.mb2.out{background:var(--blue);color:#fff;margin-left:auto;border-bottom-right-radius:2px;}
.mb2.in{background:var(--g100);color:var(--g800);border-bottom-left-radius:2px;}
@media(max-width:768px){#sb{width:44px;min-width:44px;}.ni span:not(.ic){display:none;}.ns{display:none;}.logo span:not(:first-child){display:none;}.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}.g2{grid-template-columns:1fr;}.ig{grid-template-columns:1fr;}.ccard-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<nav id="sb">
  <div class="logo">WEB<span>IGO</span></div>
  <nav id="snav">
    <div class="ns">Overview</div>
    <div class="ni active" data-tab="dashboard"><span class="ic">📊</span><span>Dashboard</span></div>
    <div class="ni" data-tab="markets"><span class="ic">🌍</span><span>Markets</span></div>
    <div class="ns">Leads</div>
    <div class="ni" data-tab="scraper"><span class="ic">🔍</span><span>Scraper</span></div>
    <div class="ni" data-tab="leads"><span class="ic">👥</span><span>All Leads</span></div>
    <div class="ni" data-tab="pipeline"><span class="ic">📋</span><span>Pipeline</span></div>
    <div class="ns">Sales</div>
    <div class="ni" data-tab="calls"><span class="ic">📞</span><span>Calls</span></div>
    <div class="ni" data-tab="scripts"><span class="ic">📖</span><span>Scripts</span></div>
    <div class="ni" data-tab="aichat"><span class="ic">🤖</span><span>AI Chat</span></div>
    <div class="ns">Work</div>
    <div class="ni" data-tab="todos"><span class="ic">✅</span><span>To-Do</span></div>
    <div class="ni" data-tab="video"><span class="ic">🎥</span><span>Video</span></div>
    <div class="ni" data-tab="tools"><span class="ic">🧰</span><span>Toolbox</span></div>
  </nav>
  <div class="sb-bot">v3.0</div>
</nav>

<div id="main">
  <div id="topbar">
    <div class="pt" id="topbar-title">Dashboard</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="clk" style="font-size:13px;color:var(--g600);font-weight:600;"></div>
      <div class="br" id="hot-badge">0 Hot</div>
    </div>
  </div>
  <div id="con"></div>
</div>

<div id="lead-modal" class="mov" style="display:none;">
  <div class="modal">
    <div class="mnav">
      <button onclick="navL(-1)" title="Prev (↑)">↑</button>
      <button onclick="navL(1)" title="Next (↓)">↓</button>
    </div>
    <button class="mcl" onclick="closeMod()">✕</button>
    <div id="mc"></div>
  </div>
</div>

<script>
// ── API HELPERS ────────────────────────────────────────
const call = async (m,p,b)=>{try{const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);const r=await fetch(p,o);return r.ok?r.json():null;}catch{return null;}};
const GET=p=>call('GET',p),POST=(p,b)=>call('POST',p,b),PATCH=(p,b)=>call('PATCH',p,b),DEL=p=>call('DELETE',p);

// ── STATE ──────────────────────────────────────────────
const S={tab:'dashboard',chat:[],leads:[],idx:0};
let scraperJobId=null,scraperTimer=null;

// ── CLOCK ──────────────────────────────────────────────
const tick=()=>{const t=new Date().toLocaleTimeString('en-US',{timeZone:'Europe/Stockholm',hour:'2-digit',minute:'2-digit',hour12:false});document.getElementById('clk').textContent='🇸🇪 '+t;};
tick();setInterval(tick,15000);

// ── NAV ────────────────────────────────────────────────
const TITLES={dashboard:'Dashboard',markets:'Markets & Call Times',scraper:'Lead Scraper',leads:'All Leads',pipeline:'Pipeline',calls:'Calls',scripts:'Sales Scripts',aichat:'AI Chat',todos:'To-Do',video:'Demo Video',tools:'Toolbox'};
document.querySelectorAll('.ni').forEach(el=>el.addEventListener('click',()=>{
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  S.tab=el.dataset.tab;
  document.getElementById('topbar-title').textContent=TITLES[el.dataset.tab]||'';
  rnd(el.dataset.tab);
}));
const goto=t=>document.querySelector(`[data-tab="${t}"]`)?.click();

async function rnd(tab){
  const c=document.getElementById('con');
  c.innerHTML='<div class="loading"><div class="spin"></div> Loading...</div>';
  const map={dashboard:rdDash,markets:rdMkt,scraper:rdScraper,leads:()=>rdLeads(),pipeline:rdPipe,calls:rdCalls,scripts:rdScripts,aichat:rdChat,todos:rdTodos,video:rdVideo,tools:rdTools};
  if(map[tab])await map[tab]();
}

// ── DASHBOARD ──────────────────────────────────────────

function selC(el,k){selCountry=k;document.querySelectorAll('.ccard').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}
function selCat(el,c){selCatVal=CATMAP[c]||c;document.querySelectorAll('.chip').forEach(ch=>ch.classList.remove('sel'));el.classList.add('sel');}

async function strtScrape(){
  const cnt=parseInt(document.getElementById('sc-cnt')?.value)||50;
  // read selected cat
  const catEl=document.querySelector('.chip.sel');
  const catRaw=catEl?.dataset?.cat||'Restaurant';
  const category=CATMAP[catRaw]||selCatVal||catRaw;

  document.getElementById('sc-status').textContent='Starting...';
  document.getElementById('sc-start').textContent='⏳ Running...';
  document.getElementById('sc-start').disabled=true;

  const r=await POST('/api/scrape/start',{country:selCountry,category,targetCount:cnt});
  if(!r?.jobId){
    document.getElementById('sc-status').textContent='Failed to start';
    document.getElementById('sc-start').textContent='🔍 Start Scraping';
    document.getElementById('sc-start').disabled=false;
    return;
  }
  scraperJobId=r.jobId;
  if(scraperTimer)clearInterval(scraperTimer);
  scraperTimer=setInterval(pollScraper,2500);
}

async function pollScraper(){
  if(!scraperJobId)return;
  const d=await GET('/api/scrape/progress/'+scraperJobId);
  if(!d)return;
  const pct=Math.min(100,d.target>0?Math.round((d.found/d.target)*100):0);
  const el=id=>document.getElementById(id);
  if(el('sc-found'))el('sc-found').textContent=d.found||0;
  if(el('sc-skip'))el('sc-skip').textContent=d.skipped||0;
  if(el('pbf'))el('pbf').style.width=pct+'%';
  if(el('sc-pct'))el('sc-pct').textContent=pct+'%';
  if(el('sc-lbl')&&d.city)el('sc-lbl').textContent=`${d.category||''} in ${d.city}`;
  const log=el('sc-log');
  if(log&&d.log?.length){
    log.innerHTML=d.log.slice(0,60).map(e=>`<div class="${e.t==='found'?'lf':e.t==='done'?'ldt':e.t==='skip'?'lsk':'lsr'}">${e.m}</div>`).join('');
  }
  if(d.status==='done'||d.status==='stopped'){
    clearInterval(scraperTimer);scraperTimer=null;
    if(el('sc-status'))el('sc-status').textContent=d.status==='done'?`✅ Done! ${d.found} leads`:'⏹ Stopped';
    if(el('sc-start')){el('sc-start').textContent='🔍 Start Scraping';el('sc-start').disabled=false;}
  } else if(el('sc-status')){
    el('sc-status').textContent=`🔄 Running...`;
  }
}

function stpScrape(){
  if(scraperJobId)POST('/api/scrape/stop',{jobId:scraperJobId});
  if(scraperTimer){clearInterval(scraperTimer);scraperTimer=null;}
  scraperJobId=null;
  const el=document.getElementById('sc-start');
  if(el){el.textContent='🔍 Start Scraping';el.disabled=false;}
}

const parseSafe=(s,f)=>{try{return JSON.parse(s||'null')||f;}catch{return f;}};
function closeMod(){document.getElementById('lead-modal').style.display='none';}
async function setStg(id,stage,btn){document.querySelectorAll('.sp').forEach(b=>b.classList.remove('active'));btn.classList.add('active');await PATCH(`/api/leads/${id}`,{stage});}
async function setCO(id,o,btn){document.querySelectorAll('.cs').forEach(b=>b.classList.remove('on'));btn.classList.add('on');const sm={interested:'hot',closed:'closed',notinterested:'lost',noanswer:'contacted',called:'contacted',callback:'contacted'};await PATCH(`/api/leads/${id}`,{call_outcome:o,last_contacted:new Date().toISOString()});if(sm[o])await PATCH(`/api/leads/${id}`,{stage:sm[o]});}
async function saveEm(id){const c=document.getElementById('em-c')?.value?.trim(),l2=document.getElementById('em-l')?.value?.trim(),d=document.getElementById('em-d')?.value;const email=c||(l2&&d?l2+d:null);if(!email)return alert('Enter an email.');await PATCH(`/api/leads/${id}`,{email});const btn=event.target;btn.textContent='✓';setTimeout(()=>btn.textContent='Save',1500);}
async function sendMsg(id){const ch=document.getElementById('msg-ch')?.value,content=document.getElementById('msg-txt')?.value?.trim();if(!content)return;await POST(`/api/leads/${id}/message`,{channel:ch,content});document.getElementById('msg-txt').value='';const btn=event.target;btn.textContent='✓ Logged!';setTimeout(()=>btn.textContent='Log / Send',1500);}
async function aiDraft(id){const btn=event.target;btn.textContent='...';const ch=document.getElementById('msg-ch')?.value;const r=await POST('/api/ai/suggest-reply',{leadId:id,channel:ch});if(r?.suggestion)document.getElementById('msg-txt').value=r.suggestion;btn.textContent='🤖 Draft';}
async function aiAnalyze(id){const btn=event.target;btn.textContent='...';const r=await POST('/api/ai/analyze-lead',{leadId:id});btn.textContent='📊 Analyze';if(r?.analysis)document.getElementById('ai-box').innerHTML=`<div class="aib" style="margin-top:8px;"><div class="aibl">🤖 AI Analysis</div><div class="aibt">${r.analysis}</div></div>`;}
async function aiQs(id){const btn=event.target;btn.textContent='...';const r=await POST('/api/ai/warmup-questions',{leadId:id});btn.textContent='❓ Questions';if(r?.questions)alert('Qualifying Questions:\n\n'+r.questions.join('\n'));}
async function vidPmt(id){const r=await POST('/api/video/generate-prompt',{leadId:id});if(r)document.getElementById('vid-out').innerHTML=`<div class="aib" style="margin-top:10px;"><div class="aibl">🎥 Video Prompt &nbsp;<a href="${r.openclaw_url||'https://openclaw.unloopa.com'}" target="_blank" style="color:var(--blue);">Open openclaw →</a></div><div class="aibt">${r.primary||''}\n\nAlt: ${r.secondary||''}</div></div>`;}
async function delLead(id){if(!confirm('Delete this lead?'))return;await DEL(`/api/leads/${id}`);closeMod();rdLeads();}

// ── CALLS ──────────────────────────────────────────────

  const w=ws[Math.floor(Math.random()*ws.length)];
  document.getElementById('con').innerHTML=`
    <div class="wisdom"><div class="wl">💡 Before you dial</div><div class="wt">"${w}"</div></div>
    <div class="g2">
      <div class="card">
        <div class="st" style="margin-bottom:12px;">Log a Call</div>
        <div class="fg"><label class="fl">Who is calling?</label>
          <div class="caller-row">
            <button class="cb2 on" id="cb-b" onclick="selCaller('Bamba')">🎤 Bamba</button>
            <button class="cb2" id="cb-l" onclick="selCaller('Lewis')">🎤 Lewis</button>
          </div>
          <input type="hidden" id="caller-v" value="Bamba">
        </div>
        <div class="fg"><label class="fl">Business Name</label><input type="text" id="call-biz" placeholder="Type name to find lead or enter manually..."></div>
        <div class="fg"><label class="fl">Outcome</label>
          <select id="call-out">
            <option value="called">Called — Spoke to them</option>
            <option value="noanswer">No Answer</option>
            <option value="interested">🔥 Interested</option>
            <option value="callback">Callback requested</option>
            <option value="notinterested">Not interested</option>
            <option value="closed">💰 CLOSED!</option>
          </select>
        </div>
        <div class="fg"><label class="fl">Price Discussed (€)</label><input type="number" id="call-price" placeholder="0"></div>
        <div class="fg"><label class="fl">Notes</label><textarea id="call-notes" placeholder="Key points from the call..."></textarea></div>
        <button class="btn bp" onclick="logCall()">Log Call</button>
      </div>
      <div class="card">
        <div class="st" style="margin-bottom:12px;">Recent Calls (${calls?.length||0})</div>
        ${!calls?.length?'<div class="empty" style="padding:20px;"><div>No calls yet.</div></div>':calls.slice(0,15).map(c=>`<div style="padding:9px 0;border-bottom:1px solid var(--g100);"><div style="display:flex;justify-content:space-between;"><div style="font-weight:700;font-size:13px;color:var(--navy);">${c.lead_name||c.business_name||'Unknown'}</div><div style="font-size:11px;color:var(--g400);">${new Date(c.called_at).toLocaleDateString()}</div></div><div style="font-size:12px;color:var(--g600);">${c.caller||''} · ${c.outcome||''} ${c.price_discussed?'· €'+c.price_discussed:''}</div>${c.summary?`<div style="font-size:12px;color:var(--g400);margin-top:2px;">${c.summary}</div>`:''}</div>`).join('')}
      </div>
    </div>`;
}
function selCaller(n){document.getElementById('caller-v').value=n;document.getElementById('cb-b').className='cb2'+(n==='Bamba'?' on':'');document.getElementById('cb-l').className='cb2'+(n==='Lewis'?' on':'');}
async function logCall(){
  const caller=document.getElementById('caller-v').value,biz=document.getElementById('call-biz').value.trim(),out=document.getElementById('call-out').value,price=document.getElementById('call-price').value||null,notes=document.getElementById('call-notes').value.trim();
  if(!biz)return alert('Enter the business name.');
  const r=await POST('/api/calls',{caller,business_name:biz,outcome:out,price_discussed:price,summary:notes});
  if(r){const btn=event.target;btn.textContent='✓ Logged!';setTimeout(()=>{btn.textContent='Log Call';rdCalls();},1200);}
}

    wa:`<div class="card"><div class="st" style="margin-bottom:14px;">💬 WhatsApp 3-Message Sequence</div>${[['Message 1 — First Contact','Hey [Name]! 👋 Found [Business] on Google Maps — love the reviews. I build websites for local businesses and wanted to reach out. Do you currently have a website? 🌐'],['Message 2 — Follow Up (24h later)','Just following up! I checked online and couldn\'t find a website for [Business]. We help businesses like yours get found on Google and get more customers every month. Happy to show you a free demo — 5 minutes. Interested? 🚀'],['Message 3 — Final (48h later)','Last one I promise 😄 — I put together a quick demo of what [Business]\'s website could look like. Here\'s the link: [DEMO LINK]. No pressure, completely free to look. If you love it, we chat. 👊']].map(([t2,b])=>`<div style="margin-bottom:14px;"><div style="font-size:12px;font-weight:800;text-transform:uppercase;color:var(--wa);margin-bottom:5px;">${t2}</div><div style="font-size:13px;line-height:1.7;background:var(--gp);border-radius:7px;padding:12px;">${b}</div></div>`).join('')}</div>`,
    email:`<div class="card"><div class="st" style="margin-bottom:14px;">✉️ Email Templates</div><div style="margin-bottom:8px;font-size:12px;font-weight:600;color:var(--g600);">Subject lines:</div><div style="margin-bottom:14px;">${['Quick question about [Business Name]','I searched for you and couldn\'t find you','Your competitors are getting your customers'].map(s=>`<div style="padding:7px 10px;background:var(--op);border-radius:5px;font-size:13px;font-weight:600;margin-bottom:5px;">✉️ ${s}</div>`).join('')}</div>${[['Cold Outreach','Hi [Name],<br><br>I came across [Business] on Google Maps — you\'ve got some really strong reviews, which tells me you\'re doing great work.<br><br>I noticed there\'s no website. That might be costing you new customers every week who search online, can\'t find you, and go to a competitor instead.<br><br>We build professional websites for local businesses — fast, affordable, and focused on getting you found on Google.<br><br>Would you be open to a quick 10-minute call this week? No pressure at all.<br><br>Best,<br>[Your Name]'],['Follow Up (3 days)','Hi [Name],<br><br>Just following up from earlier this week.<br><br>I actually put together a quick concept of what [Business]\'s website could look like — happy to send it over if you\'re curious.<br><br>Takes 2 minutes to look at and you might love it.<br><br>[Your Name]']].map(([t2,b])=>`<div style="margin-bottom:16px;"><div style="font-size:12px;font-weight:800;text-transform:uppercase;color:var(--blue);margin-bottom:5px;">${t2}</div><div style="font-size:13px;line-height:1.8;background:var(--g50);border-radius:7px;padding:13px;">${b}</div></div>`).join('')}</div>`

// ── AI CHAT ───────────────────────────────────────────
function rdChat(){
  document.getElementById('con').innerHTML=`
    <div class="chat-wrap">
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;">${['Hot Leads','Follow Ups','Draft Email','Handle Objections','What to do now','Best opener for Australia'].map(p=>`<button class="pb" onclick="chatP('${p}')">${p}</button>`).join('')}</div>
      <div id="chat-msgs" class="chat-msgs"><div class="cbm ai">Hey! I\'m your AI sales assistant. Ask me anything — hot leads, email drafts, objection handling, or just "what should I do right now?"</div></div>
      <div style="display:flex;gap:8px;"><input type="text" id="chat-in" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendChat()"><button class="btn bp" onclick="sendChat()">Send</button></div>
    </div>`;
}
async function chatP(p){document.getElementById('chat-in').value=p;sendChat();}
async function sendChat(){
  const inp=document.getElementById('chat-in');const msg=inp.value.trim();if(!msg)return;inp.value='';
  S.chat.push({role:'user',content:msg});
  const msgs=document.getElementById('chat-msgs');
  msgs.innerHTML+=`<div class="cbm user">${msg}</div><div class="cbm ai" id="ai-t">...</div>`;
  msgs.scrollTop=msgs.scrollHeight;
  const r=await POST('/api/ai/chat',{messages:S.chat,context:'You are Webigo, an AI sales assistant for a web design agency targeting local businesses without websites. Be direct, motivating, practical. Focus on getting deals closed today.'});
  const reply=r?.reply||'Error — check your Anthropic API key in Railway Variables.';
  S.chat.push({role:'assistant',content:reply});
  const el=document.getElementById('ai-t');if(el)el.innerHTML=reply.replace(/\n/g,'<br>');
  msgs.scrollTop=msgs.scrollHeight;
}
