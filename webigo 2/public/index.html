<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webigo</title>
<style>
  :root {
    --navy: #1A3C5E;
    --blue: #2563EB;
    --blue-light: #3B82F6;
    --blue-pale: #DBEAFE;
    --white: #FFFFFF;
    --gray-50: #F8FAFC;
    --gray-100: #F1F5F9;
    --gray-200: #E2E8F0;
    --gray-400: #94A3B8;
    --gray-600: #475569;
    --gray-800: #1E293B;
    --green: #16A34A;
    --green-pale: #DCFCE7;
    --red: #DC2626;
    --red-pale: #FEE2E2;
    --orange: #D97706;
    --orange-pale: #FEF3C7;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--gray-50); color: var(--gray-800); display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: 220px; min-width: 220px; background: var(--navy); display: flex; flex-direction: column;
    height: 100vh; position: relative; z-index: 10;
  }
  #sidebar .logo {
    padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 22px; font-weight: 800; color: white; letter-spacing: 2px;
  }
  #sidebar .logo span { color: var(--blue-light); }
  #sidebar nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 11px 20px;
    color: rgba(255,255,255,0.65); cursor: pointer; font-size: 14px; font-weight: 500;
    transition: all 0.15s; border-left: 3px solid transparent; white-space: nowrap;
  }
  .nav-item:hover { color: white; background: rgba(255,255,255,0.07); }
  .nav-item.active { color: white; background: rgba(37,99,235,0.3); border-left-color: var(--blue-light); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-section { padding: 16px 20px 6px; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
  #sidebar .bottom { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: rgba(255,255,255,0.4); }

  /* MAIN */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar {
    background: white; border-bottom: 1px solid var(--gray-200); padding: 0 24px;
    height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  #topbar .page-title { font-size: 16px; font-weight: 700; color: var(--navy); }
  #topbar .topbar-right { display: flex; align-items: center; gap: 12px; }
  .badge { background: var(--blue); color: white; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 12px; }
  #content { flex: 1; overflow-y: auto; padding: 24px; }

  /* CARDS */
  .card { background: white; border-radius: 10px; border: 1px solid var(--gray-200); padding: 20px; }
  .card-title { font-size: 12px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* STAT CARDS */
  .stat-card { background: white; border-radius: 10px; border: 1px solid var(--gray-200); padding: 18px 20px; }
  .stat-value { font-size: 28px; font-weight: 800; color: var(--navy); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--gray-400); margin-top: 4px; font-weight: 500; }
  .stat-sub { font-size: 11px; color: var(--green); margin-top: 2px; }
  .stat-card.revenue .stat-value { color: var(--green); }
  .stat-card.blue .stat-value { color: var(--blue); }

  /* MARKET CARDS */
  .market-card {
    background: white; border-radius: 10px; border: 1px solid var(--gray-200);
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
  }
  .market-card.open { border-color: var(--green); background: var(--green-pale); }
  .market-card.closed { opacity: 0.7; }
  .market-flag { font-size: 22px; }
  .market-info { flex: 1; margin-left: 10px; }
  .market-name { font-size: 13px; font-weight: 700; color: var(--navy); text-transform: capitalize; }
  .market-time { font-size: 18px; font-weight: 800; color: var(--gray-800); }
  .market-date { font-size: 11px; color: var(--gray-400); }
  .market-status { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .market-status.open { background: var(--green); color: white; }
  .market-status.closed { background: var(--gray-200); color: var(--gray-600); }
  .market-status.weekend { background: var(--orange-pale); color: var(--orange); }
  .my-time { font-size: 11px; color: var(--gray-600); margin-top: 2px; }

  /* PIPELINE */
  .pipeline { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; }
  .pipeline-col { min-width: 160px; background: var(--gray-100); border-radius: 8px; padding: 10px; }
  .pipeline-col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 2px solid var(--gray-200); }
  .pipeline-count { float: right; background: var(--navy); color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
  .pipeline-card { background: white; border-radius: 6px; padding: 10px; margin-bottom: 8px; border: 1px solid var(--gray-200); cursor: pointer; font-size: 12px; }
  .pipeline-card:hover { border-color: var(--blue); }
  .pipeline-card .pc-name { font-weight: 700; color: var(--navy); margin-bottom: 3px; }
  .pipeline-card .pc-cat { color: var(--gray-400); font-size: 11px; }

  /* LEADS TABLE */
  .leads-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .leads-table th { background: var(--gray-100); color: var(--gray-600); font-weight: 600; padding: 10px 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 1; }
  .leads-table td { padding: 10px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  .leads-table tr:hover td { background: var(--blue-pale); cursor: pointer; }
  .lead-name { font-weight: 700; color: var(--navy); }
  .lead-city { color: var(--gray-400); font-size: 12px; }

  /* STAGE BADGES */
  .stage { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .stage-new { background: var(--gray-100); color: var(--gray-600); }
  .stage-contacted { background: var(--blue-pale); color: var(--blue); }
  .stage-responded { background: #FEF3C7; color: #D97706; }
  .stage-hot { background: #FEE2E2; color: #DC2626; }
  .stage-negotiation { background: #F3E8FF; color: #7C3AED; }
  .stage-demo { background: #ECFDF5; color: #059669; }
  .stage-closed { background: var(--green-pale); color: var(--green); }
  .stage-lost { background: var(--gray-100); color: var(--gray-400); }

  /* TEMP DOT */
  .temp-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .temp-cold .temp-dot { background: var(--gray-400); }
  .temp-warm .temp-dot { background: var(--orange); }
  .temp-hot .temp-dot { background: var(--red); }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--gray-600); display: block; margin-bottom: 5px; }
  input, select, textarea {
    width: 100%; padding: 9px 12px; border: 1px solid var(--gray-200); border-radius: 7px;
    font-size: 13px; font-family: var(--font); color: var(--gray-800); background: white;
    transition: border 0.15s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-pale); }
  textarea { resize: vertical; min-height: 80px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: var(--font); }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: #1D4ED8; }
  .btn-secondary { background: var(--gray-100); color: var(--gray-800); border: 1px solid var(--gray-200); }
  .btn-secondary:hover { background: var(--gray-200); }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { background: #B91C1C; }
  .btn-success { background: var(--green); color: white; }
  .btn-success:hover { background: #15803D; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-navy { background: var(--navy); color: white; }
  .btn-navy:hover { background: #0F2A44; }

  /* SCRAPER */
  .progress-bar-wrap { background: var(--gray-100); border-radius: 6px; height: 10px; overflow: hidden; margin: 10px 0; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--blue-light)); border-radius: 6px; transition: width 0.4s ease; }
  .scrape-log { background: var(--gray-800); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; color: #A3E635; max-height: 180px; overflow-y: auto; }
  .scrape-log .log-line { margin-bottom: 3px; }
  .scrape-log .log-line.found { color: #4ADE80; }
  .scrape-log .log-line.searching { color: #60A5FA; }

  /* TODOS */
  .todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px; border-bottom: 1px solid var(--gray-100); }
  .todo-item:last-child { border-bottom: none; }
  .todo-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--gray-300); cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .todo-check.done { background: var(--green); border-color: var(--green); color: white; font-size: 10px; }
  .todo-content { flex: 1; }
  .todo-title { font-size: 13px; font-weight: 600; color: var(--gray-800); }
  .todo-title.done { text-decoration: line-through; color: var(--gray-400); }
  .todo-desc { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .todo-meta { display: flex; gap: 8px; margin-top: 5px; }
  .priority-urgent { color: var(--red); font-size: 11px; font-weight: 700; }
  .priority-high { color: var(--orange); font-size: 11px; font-weight: 700; }
  .priority-medium { color: var(--blue); font-size: 11px; font-weight: 700; }
  .priority-low { color: var(--gray-400); font-size: 11px; }

  /* CALLS */
  .call-card { background: white; border: 1px solid var(--gray-200); border-radius: 8px; padding: 16px; margin-bottom: 10px; }
  .call-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .call-name { font-weight: 700; color: var(--navy); }
  .call-date { font-size: 12px; color: var(--gray-400); }
  .call-wisdom { background: linear-gradient(135deg, var(--navy), #1e4d7b); border-radius: 10px; padding: 16px 20px; color: white; margin-bottom: 20px; }
  .call-wisdom .wisdom-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
  .call-wisdom .wisdom-text { font-size: 14px; color: rgba(255,255,255,0.9); line-height: 1.5; font-style: italic; }

  /* AI CHAT */
  .chat-wrap { display: flex; flex-direction: column; height: 100%; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: var(--gray-50); border-radius: 8px; margin-bottom: 12px; min-height: 300px; }
  .chat-bubble { max-width: 75%; padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.5; }
  .chat-bubble.user { background: var(--blue); color: white; align-self: flex-end; border-bottom-right-radius: 3px; }
  .chat-bubble.ai { background: white; color: var(--gray-800); border: 1px solid var(--gray-200); align-self: flex-start; border-bottom-left-radius: 3px; }
  .chat-presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .preset-btn { background: var(--blue-pale); color: var(--blue); border: none; padding: 5px 11px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); }
  .preset-btn:hover { background: var(--blue); color: white; }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input-row input { flex: 1; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
  .modal { background: white; border-radius: 12px; width: 100%; max-width: 680px; padding: 28px; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: var(--gray-100); border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 16px; color: var(--gray-600); }
  .modal-title { font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 20px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-400); margin-bottom: 8px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-item .info-label { font-size: 11px; color: var(--gray-400); font-weight: 600; }
  .info-item .info-val { font-size: 13px; font-weight: 600; color: var(--gray-800); }

  /* LEAD DETAIL */
  .social-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .social-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; background: var(--blue-pale); color: var(--blue); border-radius: 20px; font-size: 12px; font-weight: 600; text-decoration: none; }
  .social-chip:hover { background: var(--blue); color: white; }
  .message-bubble { padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 8px; max-width: 80%; }
  .message-bubble.out { background: var(--blue); color: white; margin-left: auto; border-bottom-right-radius: 2px; }
  .message-bubble.in { background: var(--gray-100); color: var(--gray-800); border-bottom-left-radius: 2px; }
  .message-meta { font-size: 10px; opacity: 0.7; margin-top: 2px; }

  /* TOOLS */
  .tool-card { background: white; border: 1px solid var(--gray-200); border-radius: 10px; padding: 16px; display: flex; align-items: flex-start; gap: 12px; }
  .tool-icon { font-size: 26px; flex-shrink: 0; }
  .tool-name { font-weight: 700; color: var(--navy); font-size: 14px; }
  .tool-desc { font-size: 12px; color: var(--gray-600); margin-top: 3px; line-height: 1.5; }
  .tool-link { font-size: 12px; color: var(--blue); margin-top: 6px; display: inline-block; font-weight: 600; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 20px; color: var(--gray-400); }
  .empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty .empty-text { font-size: 14px; }

  /* TAB ROW */
  .tab-row { display: flex; gap: 4px; margin-bottom: 20px; background: var(--gray-100); padding: 4px; border-radius: 8px; width: fit-content; }
  .tab-btn { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--gray-600); font-family: var(--font); transition: all 0.15s; }
  .tab-btn.active { background: white; color: var(--navy); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  /* SECTION HEADING */
  .section-heading { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 16px; font-weight: 800; color: var(--navy); }

  /* MISC */
  .divider { border: none; border-top: 1px solid var(--gray-100); margin: 16px 0; }
  .text-sm { font-size: 12px; }
  .text-muted { color: var(--gray-400); }
  .stars { color: #F59E0B; }
  .loading { display: flex; align-items: center; gap: 8px; color: var(--gray-400); font-size: 13px; padding: 20px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--gray-200); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ai-box { background: linear-gradient(135deg, #EFF6FF, #DBEAFE); border: 1px solid #BFDBFE; border-radius: 8px; padding: 14px; margin-top: 10px; }
  .ai-box-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--blue); margin-bottom: 6px; }
  .ai-box-text { font-size: 13px; color: var(--gray-800); line-height: 1.6; }

  @media (max-width: 900px) {
    #sidebar { width: 56px; min-width: 56px; }
    .nav-item span, .nav-section, #sidebar .logo { display: none; }
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="logo">WEB<span>IGO</span></div>
  <nav>
    <div class="nav-section">Overview</div>
    <div class="nav-item active" data-tab="dashboard"><span class="icon">📊</span><span>Dashboard</span></div>
    <div class="nav-item" data-tab="markets"><span class="icon">🌍</span><span>Markets</span></div>

    <div class="nav-section">Leads</div>
    <div class="nav-item" data-tab="scraper"><span class="icon">🔍</span><span>Scraper</span></div>
    <div class="nav-item" data-tab="leads"><span class="icon">👥</span><span>All Leads</span></div>
    <div class="nav-item" data-tab="pipeline"><span class="icon">📋</span><span>Pipeline</span></div>

    <div class="nav-section">Sales</div>
    <div class="nav-item" data-tab="calls"><span class="icon">📞</span><span>Calls</span></div>
    <div class="nav-item" data-tab="scripts"><span class="icon">📖</span><span>Scripts</span></div>
    <div class="nav-item" data-tab="aichat"><span class="icon">🤖</span><span>AI Chat</span></div>

    <div class="nav-section">Work</div>
    <div class="nav-item" data-tab="todos"><span class="icon">✅</span><span>To-Do</span></div>
    <div class="nav-item" data-tab="video"><span class="icon">🎥</span><span>Demo Video</span></div>
    <div class="nav-item" data-tab="tools"><span class="icon">🧰</span><span>Toolbox</span></div>
  </nav>
  <div class="bottom">v2.0</div>
</nav>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div class="page-title" id="topbar-title">Dashboard</div>
    <div class="topbar-right">
      <div id="topbar-clock" style="font-size:13px;color:var(--gray-600);font-weight:600;"></div>
      <div class="badge" id="hot-badge">0 Hot</div>
    </div>
  </div>
  <div id="content"></div>
</div>

<!-- LEAD DETAIL MODAL -->
<div id="lead-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const state = {
  currentTab: 'dashboard',
  leads: [], total: 0,
  stats: null,
  todos: [],
  calls: [],
  scrapeJobs: {},
  chatHistory: [],
  scrapeLog: [],
  markets: {}
};

// ── API ────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    if (!res.ok) throw new Error(`${res.status}`);
    return res.json();
  } catch (e) {
    console.error(path, e.message);
    return null;
  }
}
const GET  = (p) => api('GET', p);
const POST = (p, b) => api('POST', p, b);
const PATCH = (p, b) => api('PATCH', p, b);

// ── SSE ────────────────────────────────────────────────────────────────────
function startSSE() {
  const es = new EventSource('/api/stream');
  es.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'scrape_progress') handleScrapeProgress(data);
  };
}

function handleScrapeProgress(d) {
  const line = d.status === 'found'
    ? `✓ Found: ${d.leadName} (${d.found}/${d.target})`
    : d.status === 'completed'
    ? `✅ Complete — ${d.found} leads found`
    : `🔍 Searching ${d.category} in ${d.city}... (${d.found}/${d.target})`;

  state.scrapeLog.unshift({ text: line, type: d.status });
  if (state.scrapeLog.length > 50) state.scrapeLog.pop();

  if (state.currentTab === 'scraper') {
    const logEl = document.getElementById('scrape-log');
    if (logEl) logEl.innerHTML = state.scrapeLog.map(l =>
      `<div class="log-line ${l.type === 'found' ? 'found' : 'searching'}">${l.text}</div>`).join('');

    const pct = Math.round((d.found / d.target) * 100);
    const fill = document.getElementById('progress-fill');
    const pctEl = document.getElementById('progress-pct');
    if (fill) fill.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
  }
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
const TAB_TITLES = {
  dashboard:'Dashboard', markets:'Markets', scraper:'Lead Scraper',
  leads:'All Leads', pipeline:'Pipeline', calls:'Calls', scripts:'Sales Scripts',
  aichat:'AI Chat', todos:'To-Do', video:'Demo Video', tools:'Toolbox'
};

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    const tab = el.dataset.tab;
    state.currentTab = tab;
    document.getElementById('topbar-title').textContent = TAB_TITLES[tab] || tab;
    renderTab(tab);
  });
});

async function renderTab(tab) {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';
  switch(tab) {
    case 'dashboard': await renderDashboard(); break;
    case 'markets':   await renderMarkets(); break;
    case 'scraper':   renderScraper(); break;
    case 'leads':     await renderLeads(); break;
    case 'pipeline':  await renderPipeline(); break;
    case 'calls':     await renderCalls(); break;
    case 'scripts':   await renderScripts(); break;
    case 'aichat':    renderAIChat(); break;
    case 'todos':     await renderTodos(); break;
    case 'video':     renderVideo(); break;
    case 'tools':     renderTools(); break;
  }
}

  const country = document.getElementById('scrape-country').value;
  const category = document.getElementById('scrape-category').value;

  const pLabel = document.getElementById('progress-label');
  if (pLabel) pLabel.textContent = `Scraping ${category} in ${country}...`;

  const result = await POST('/api/scrape/start', { country, category, targetCount: count });
  if (result?.jobId) {
    currentJobId = result.jobId;
    state.scrapeLog = [];
  }

  if (currentJobId) {
    POST('/api/scrape/stop', { jobId: currentJobId });

}

async function renderLeads(country = '', category = '', stage = '', search = '') {
  const params = new URLSearchParams({ limit: 200 });

  if (category) params.set('category', category);
  if (stage) params.set('stage', stage);
  if (search) params.set('search', search);

  const data = await GET('/api/leads?' + params);
  const leads = data?.leads || [];

  const countries = [...new Set(leads.map(l => l.country).filter(Boolean))];
  const categories = [...new Set(leads.map(l => l.category).filter(Boolean))];

  document.getElementById('content').innerHTML = `
    <div class="card" style="margin-bottom:16px;padding:14px 20px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">

          <option value="">All Stages</option>
          ${['new','contacted','responded','hot','negotiation','demo','closed','lost'].map(s => `<option value="${s}" ${s===stage?'selected':''}>${s}</option>`).join('')}
        </select>
        <span style="font-size:13px;color:var(--gray-400);margin-left:auto;">${data?.total || 0} leads</span>
      </div>
    </div>

      <div style="overflow-x:auto;">
        <table class="leads-table">
          <thead><tr>
            <th>Business</th><th>Category</th><th>Country</th><th>Phone</th>
            <th>Reviews</th><th>Stage</th><th>Temperature</th><th>Last Contact</th>
          </tr></thead>

            ${leads.map(l => `
              <tr onclick="openLead(${l.id})">
                <td>
                  <div class="lead-name">${l.name}</div>
                  <div class="lead-city">${l.city || ''}</div>
                </td>
                <td style="font-size:12px;color:var(--gray-600);">${l.category || '-'}</td>
                <td style="font-size:12px;">${l.country || '-'}</td>
                <td style="font-size:12px;">${l.phone || '-'}</td>

                </td>
                <td><span class="stage stage-${l.stage}">${l.stage}</span></td>
                <td>
                  <span class="temp-${l.temperature || 'cold'}">
                    <span class="temp-dot"></span>${l.temperature || 'cold'}
                  </span>
                </td>
                <td style="font-size:12px;color:var(--gray-400);">${l.last_contacted ? new Date(l.last_contacted).toLocaleDateString() : '-'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`}
    </div>`;
}

let searchTimer;
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 400);
}
function applyFilters() {
  const country = document.getElementById('filter-country')?.value || '';
  const category = document.getElementById('filter-category')?.value || '';
  const stage = document.getElementById('filter-stage')?.value || '';
  const search = document.getElementById('lead-search')?.value || '';
  renderLeads(country, category, stage, search);
}

function closeModal() {
  document.getElementById('lead-modal').style.display = 'none';
}

async function updateLeadStage(id, stage) {
  await PATCH(`/api/leads/${id}`, { stage });
  if (state.currentTab === 'pipeline') renderPipeline();
  if (state.currentTab === 'leads') applyFilters();
}

async function sendMessage(id) {
  const channel = document.getElementById('msg-channel').value;
  const content = document.getElementById('msg-content').value.trim();
  if (!content) return;
  await POST(`/api/leads/${id}/message`, { channel, content });
  document.getElementById('msg-content').value = '';
  alert('Message logged!');
}

async function getSuggestion(id) {
  const channel = document.getElementById('msg-channel').value;
  const btn = event.target;
  btn.textContent = '...';
  const result = await POST('/api/ai/suggest-reply', { leadId: id, channel });
  if (result?.suggestion) document.getElementById('msg-content').value = result.suggestion;
  btn.textContent = '🤖 AI Draft';
}

async function analyzeLeadAI(id) {
  const btn = event.target;
  btn.textContent = '...';
  const result = await POST('/api/ai/analyze-lead', { leadId: id });
  btn.textContent = '📊 Analyze';
  if (result?.analysis) {

function renderAIChat() {
  document.getElementById('content').innerHTML = `
    <div class="card" style="height:calc(100vh - 120px);display:flex;flex-direction:column;padding:16px;">
      <div class="chat-presets">
        <button class="preset-btn" onclick="chatPreset('Check on my hottest leads right now')">🔥 Hot Leads</button>
        <button class="preset-btn" onclick="chatPreset('Which leads should I follow up with today?')">📋 Follow Ups</button>
        <button class="preset-btn" onclick="chatPreset('Which leads have not been checked in over a week?')">⏰ Unchecked</button>
        <button class="preset-btn" onclick="chatPreset('What should my top priority be right now to make money today?')">💰 Priority</button>
        <button class="preset-btn" onclick="chatPreset('Give me a cold email for a restaurant with no website')">✉️ Draft Email</button>
        <button class="preset-btn" onclick="chatPreset('How do I handle a price objection on a sales call?')">💬 Objections</button>
      </div>
      <div class="chat-messages" id="chat-msgs">
        <div class="chat-bubble ai">Hey! I'm your Webigo AI. Ask me anything — leads, scripts, strategy, copy. What do you need?</div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn btn-primary" onclick="sendChat()">Send</button>
      </div>
    </div>`;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const msgs = document.getElementById('chat-msgs');
  msgs.innerHTML += `<div class="chat-bubble user">${msg}</div>`;
  msgs.innerHTML += `<div class="chat-bubble ai" id="ai-typing"><div class="spinner"></div></div>`;
  msgs.scrollTop = msgs.scrollHeight;

  state.chatHistory.push({ role: 'user', content: msg });
  const result = await POST('/api/ai/chat', { message: msg });

  document.getElementById('ai-typing')?.remove();
  const reply = result?.reply || 'No response.';
  msgs.innerHTML += `<div class="chat-bubble ai">${reply.replace(/\n/g,'<br>')}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function chatPreset(text) {
  document.getElementById('chat-input').value = text;
  sendChat();
}

async function renderTodos() {
  const todos = await GET('/api/todos');

  const urgent = (todos || []).filter(t => t.priority === 'urgent');
  const high = (todos || []).filter(t => t.priority === 'high');
  const medium = (todos || []).filter(t => ['medium','low'].includes(t.priority));

  function renderTodoGroup(items) {
    return items.map(t => `
      <div class="todo-item">
        <div class="todo-check ${t.completed ? 'done' : ''}" onclick="toggleTodo(${t.id}, ${!t.completed})">
          ${t.completed ? '✓' : ''}
        </div>
        <div class="todo-content">
          <div class="todo-title ${t.completed ? 'done' : ''}">${t.title}</div>
          ${t.description ? `<div class="todo-desc">${t.description}</div>` : ''}
          <div class="todo-meta">
            <span class="priority-${t.priority}">${t.priority.toUpperCase()}</span>
            ${t.lead_name ? `<span style="font-size:11px;color:var(--gray-400);">· ${t.lead_name}</span>` : ''}
            <span style="font-size:11px;color:var(--gray-400);">${t.type}</span>
          </div>
        </div>
      </div>`).join('');
  }

  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div class="section-title">Today's To-Do</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="generateAITodos()">🤖 AI Generate</button>
        <button class="btn btn-primary btn-sm" onclick="showAddTodo()">+ Add Task</button>
      </div>
    </div>

    <div id="add-todo-form" style="display:none;" class="card" style="margin-bottom:16px;">
      <div class="form-group"><label class="form-label">Task Title</label><input type="text" id="new-todo-title" placeholder="Task title..."></div>
      <div class="form-group"><label class="form-label">Description</label><input type="text" id="new-todo-desc" placeholder="Optional details..."></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Priority</label>
          <select id="new-todo-priority"><option value="urgent">Urgent</option><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>
        </div>
        <div class="form-group"><label class="form-label">Type</label>
          <select id="new-todo-type"><option value="sales">Sales</option><option value="fulfillment">Fulfillment</option><option value="followup">Follow Up</option><option value="general">General</option></select>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="addTodo()">Add</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('add-todo-form').style.display='none'">Cancel</button>
      </div>
    </div>

    ${urgent.length ? `
      <div class="card" style="margin-bottom:16px;border-color:var(--red);">
        <div style="color:var(--red);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">🔴 Urgent</div>
        ${renderTodoGroup(urgent)}
      </div>` : ''}

    ${high.length ? `
      <div class="card" style="margin-bottom:16px;border-color:var(--orange);">
        <div style="color:var(--orange);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">🟡 High Priority</div>
        ${renderTodoGroup(high)}
      </div>` : ''}

    ${medium.length ? `
      <div class="card" style="margin-bottom:16px;">
        <div style="color:var(--blue);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">🔵 Medium / Low</div>
        ${renderTodoGroup(medium)}
      </div>` : ''}

    ${!todos?.length ? '<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">No tasks. Click "AI Generate" to create today\'s to-do list.</div></div>' : ''}
  `;
}

function showAddTodo() {
  const el = document.getElementById('add-todo-form');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function addTodo() {
  const title = document.getElementById('new-todo-title').value.trim();
  if (!title) return;
  await POST('/api/todos', {
    title,
    description: document.getElementById('new-todo-desc').value,
    priority: document.getElementById('new-todo-priority').value,
    type: document.getElementById('new-todo-type').value
  });
  renderTodos();
}

async function toggleTodo(id, done) {
  await PATCH(`/api/todos/${id}`, { completed: done });
  renderTodos();
}

async function generateAITodos() {
  const btn = event.target;
  btn.textContent = 'Generating...';
  await POST('/api/ai/generate-todos', {});
  btn.textContent = '🤖 AI Generate';
  renderTodos();
}

// ── CLOCK ──────────────────────────────────────────────────────────────────
function startClock() {
  function tick() {
    const now = new Date();
    const t = now.toLocaleTimeString('en-US', { timeZone:'Europe/Stockholm', hour:'2-digit', minute:'2-digit', hour12:false });
    document.getElementById('topbar-clock').textContent = t;
  }
  tick();
  setInterval(tick, 10000);
}
